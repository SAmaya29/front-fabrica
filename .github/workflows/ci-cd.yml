name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/ci-cd.yml
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/ci-cd.yml
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
